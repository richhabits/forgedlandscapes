<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Forged Landscapes roundel seal">
  <style>
    .g{fill:var(--ground,#0E3B2E)}
    .ox{fill:var(--oxblood,#5C1F1F)}
    .i{fill:var(--ink,#F2EAD8)}
    .ring{fill:none;stroke:var(--ink,#F2EAD8);stroke-width:2}
    .a{fill:none;stroke:var(--accent,#C9A24B);stroke-width:1}
    .t{fill:var(--ink,#F2EAD8);font-family:'Cinzel','Marcellus',Didot,serif;font-size:14px;letter-spacing:3px}
  </style>
  <circle class="g" cx="120" cy="120" r="118"/>
  <circle class="a" cx="120" cy="120" r="114"/>
  <circle class="ring" cx="120" cy="120" r="110" stroke-width="1.4"/>
  <circle class="ox" cx="120" cy="120" r="82"/>
  <circle class="a" cx="120" cy="120" r="82"/>
  <circle class="ring" cx="120" cy="120" r="76" stroke-width="1"/>

  <defs>
    <path id="topB" d="M120 30 a90 90 0 0 1 0 180" fill="none"/>
    <path id="botB" d="M120 210 a90 90 0 0 1 0 -180" fill="none"/>
  </defs>
  <text class="t"><textPath href="#topB" startOffset="50%" text-anchor="middle">FORGED · LANDSCAPES</textPath></text>
  <text class="t"><textPath href="#botB" startOffset="50%" text-anchor="middle">WATFORD · HERTFORDSHIRE</textPath></text>
  <path class="i" d="M32 120 l5 5 -5 5 -5 -5 Z"/>
  <path class="i" d="M208 120 l5 5 -5 5 -5 -5 Z"/>

  <!-- central crossed hammer + anvil, bold -->
  <g class="i">
    <rect x="106" y="92" width="10" height="60" rx="2" transform="rotate(38 111 122)"/>
    <path d="M138 86 l22 12 -7 13 -22 -12 Z"/>
    <path d="M96 116 h56 v12 h-10 l-6 6 h-14 l-6 -6 h-8 Z"/>
    <path d="M116 134 h20 l-4 18 h-12 Z"/>
    <path d="M104 152 h44 l5 12 h-54 Z"/>
  </g>
</svg>
